name: Publish ClickOnce

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # create GitHub Releases and upload assets
  pages: write     # deploy to gh-pages
  id-token: write  # required by deploy-pages

jobs:
  publish:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # Strip leading 'v': v1.2.3 -> 1.2.3
      - name: Extract version from tag
        id: version
        shell: bash
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # Pages URL: https://<owner>.github.io/<repo>/
      - name: Build install URL
        id: urls
        shell: bash
        run: |
          OWNER="${{ github.repository_owner }}"
          REPO="${{ github.event.repository.name }}"
          INSTALL_URL="https://${OWNER}.github.io/${REPO}/"
          echo "install_url=$INSTALL_URL" >> "$GITHUB_OUTPUT"

      # MSBuild (from VS) is required for GenerateBootstrapper (setup.exe).
      # dotnet CLI MSBuild does not support that task (MSB4803).
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore
        run: dotnet restore ATRun.sln

      - name: Run tests
        run: dotnet test ATRun.Tests/ATRun.Tests.csproj --configuration Release --no-restore --verbosity normal

      - name: Publish ClickOnce
        run: >
          msbuild ATRun.csproj
          /target:Publish
          /p:PublishProfile=Properties/PublishProfiles/ClickOnceProfile.pubxml
          /p:Configuration=Release
          /p:ApplicationVersion=${{ steps.version.outputs.version }}.0
          /p:InstallUrl=${{ steps.urls.outputs.install_url }}
          /p:UpdateUrl=${{ steps.urls.outputs.install_url }}
          /p:InstallFrom=Web
          /p:IsWebBootstrapper=True
          /p:UpdateEnabled=True
          /p:UpdateMode=Foreground
          /p:UpdateRequired=False
          /p:PublishDir=publish-output\

      # Prevent git from converting line endings in ClickOnce XML manifests.
      # Any CRLF<->LF change would break hash validation during installation.
      - name: Mark ClickOnce files as binary for git
        shell: bash
        run: |
          cat > publish-output/.gitattributes <<'EOF'
          * binary
          EOF

      - name: Publish self-contained single-file EXE
        run: >
          dotnet publish ATRun.csproj
          --configuration Release
          --runtime win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -p:EnableCompressionInSingleFile=true
          -p:Version=${{ steps.version.outputs.version }}
          --output selfcontained-output

      - name: Rename self-contained artifact
        shell: bash
        run: mv selfcontained-output/ATRun.exe "selfcontained-output/ATRun-${{ github.ref_name }}-win-x64.exe"

      # keep_files=true preserves old .deploy bundles so clients mid-update don't get 404s
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: publish-output
          keep_files: true
          enable_jekyll: false

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ATRun ${{ steps.version.outputs.version }}
          body: |
            ## Install

            **Online installer (recommended — receives auto-updates):**
            [${{ steps.urls.outputs.install_url }}ATRun.application](${{ steps.urls.outputs.install_url }}ATRun.application)

            Click the link above to install via ClickOnce. The application will update
            itself automatically on each launch when a new version is published.

            **Web bootstrapper (installs .NET 10 if needed, then downloads the app):**
            Download `setup.exe` from the assets below. An internet connection is required.

            **Offline / portable (no installation, no internet required):**
            Download `ATRun-${{ github.ref_name }}-win-x64.exe` from the assets below.
            Self-contained single file — just download and run on Windows x64.
          files: |
            publish-output/setup.exe
            selfcontained-output/ATRun-${{ github.ref_name }}-win-x64.exe
          fail_on_unmatched_files: true
